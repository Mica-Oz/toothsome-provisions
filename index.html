<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Toothsome Provisions</title>
  <style>
    :root {
      color-scheme: dark;
      --bg-1: #2d0200;
      --bg-2: #470700;
      --bg-3: #8a0d00;
      --text: #ffe8d8;
      --accent: #ff6b00;
      --muted: #ffc8b0;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, var(--bg-3) 0%, var(--bg-2) 35%, var(--bg-1) 100%);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      text-align: center;
    }

    .hero {
      width: min(88vw, 740px);
      padding: 3rem 2rem;
      border-radius: 32px;
      border: 1px solid rgba(255, 107, 0, 0.25);
      background: linear-gradient(180deg, rgba(255, 75, 0, 0.12), rgba(0, 0, 0, 0.55));
      box-shadow: 0 30px 90px rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(14px);
    }

    .flame {
      display: inline-block;
      margin-bottom: 1.2rem;
      font-size: 2.5rem;
      animation: flicker 1.8s ease-in-out infinite;
    }

    h1 {
      margin: 0;
      font-size: clamp(3rem, 6vw, 4.5rem);
      letter-spacing: -0.05em;
      text-transform: uppercase;
      text-shadow: 0 0 18px rgba(255, 107, 0, 0.22);
    }

    p {
      margin: 1.4rem 0 0;
      font-size: 1.1rem;
      color: var(--muted);
      line-height: 1.75;
    }

    .accent {
      margin-top: 1rem;
      display: inline-flex;
      align-items: center;
      gap: 0.7rem;
      font-size: 1.15rem;
      color: var(--accent);
      font-weight: 700;
      letter-spacing: 0.06em;
    }

    @keyframes flicker {
      0%, 100% { transform: translateY(0); opacity: 1; }
      50% { transform: translateY(-2px); opacity: 0.85; }
    }
  </style>
</head>
<body>
  <section class="hero">
    <div class="flame">🌶️🔥</div>
    <h1>toothsome provisions</h1>
    <p class="accent">coming soon</p>
    <p>Hot sauce energy, bold flavor, and premium provisions are on the way. Stay tuned for the full launch.</p>
  </section>
</body>
</html>
